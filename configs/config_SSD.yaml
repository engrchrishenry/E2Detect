MODEL:
  NUM_CLASSES: 21
  INPUT_SIZE: 300
  BACKBONE:
    PRETRAINED: True
    WEIGHTS_PATH: 'weights/vgg16_reducedfc.pth'
    MAP_LOCATION: 'cpu'
    OUT_CHANNELS: [512, 1024, 512, 256, 256, 256]
  
  THRESHOLD: 0.5
  NEG_POS_RATIO: 3
  CENTER_VARIANCE: 0.1
  SIZE_VARIANCE: 0.2

  PRIORS:
    FEATURE_MAPS: [38, 19, 10, 5, 3, 1]
    STRIDES: [8, 16, 32, 64, 100, 300]
    MIN_SIZES: [30, 60, 111, 162, 213, 264]
    MAX_SIZES: [60, 111, 162, 213, 264, 315]
    ASPECT_RATIOS: [[2], [2, 3], [2, 3], [2, 3], [2], [2]]
    BOXES_PER_LOCATION: [4, 6, 6, 6, 4, 4]
    CLIP: True

INPUT:
  IMAGE_SIZE: 300
  PIXEL_MEAN: [123, 117, 104]

SOLVER:
  MAX_ITER: 120000
  LR_STEPS: [80000, 100000]
  GAMMA: 0.1
  BATCH_SIZE: 32
  LR: 1e-3
  MOMENTUM: 0.9
  WEIGHT_DECAY: 5e-4
  WARMUP_FACTOR: 1.0 / 3
  WARMUP_ITERS: 500

TEST:
  NMS_THRESHOLD: 0.45
  CONFIDENCE_THRESHOLD: 0.01
  MAX_PER_CLASS: -1
  MAX_PER_IMAGE: 100

